apiVersion: apps/v1
kind: Deployment
metadata:
  name: cronpot-api
spec:
  template:
    spec:
      containers:
        - name: api
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - python
            - -m
            - cronpot
            - serve
            - --vault
            - /vault
            - --config
            - /config/cronpot.toml
          env:
            - name: PYTHONPATH
              value: /app
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CRONPOT_AUTH_CODE
              valueFrom:
                secretKeyRef:
                  name: cronpot-local-auth
                  key: code
                  optional: true
          volumeMounts:
            - name: source
              mountPath: /app/cronpot
              readOnly: true
      volumes:
        - name: source
          configMap:
            name: cronpot-source
