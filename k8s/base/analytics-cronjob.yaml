apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronpot-analytics
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: cronpot
          securityContext:
            fsGroup: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
          containers:
            - name: analytics
              image: cronpot:latest
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - cronpot
                - analytics
                - --vault
                - /vault
                - --json
              resources:
                requests:
                  cpu: 25m
                  memory: 96Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: vault
                  mountPath: /vault
          volumes:
            - name: vault
              persistentVolumeClaim:
                claimName: cronpot-vault
