apiVersion: v1
kind: ConfigMap
metadata:
  name: cronpot-config
data:
  cronpot.toml: |
    [recipe]
    default_vault = "/vault/docs"
    require_dietary_tag = true

    [schema]
    ingredient_heading = "Ingredients"
    method_heading = "Method"
    frontmatter_fields = ["tags", "source", "source_hash", "prep_time", "cook_time", "total_time", "servings", "yield"]

    [style]
    english = "british"
    # Options: unicode, ascii, decimal
    fraction_style = "unicode"
    method_style = "imperative"

    [worker]
    count = 2
    max_attempts = 3
    stale_after_seconds = 900

    [llm]
    provider = "ollama"
    base_url = "http://ollama.ollama.svc.cluster.local:11434"
    model = "qwen2.5:3b"
    auto_normalise_ingredients = true
    rewrite_ingested_recipes = true
    ingredient_limit = 120
